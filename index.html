<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Gastos - Cloud V32</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script type="module">
        // IMPORTAÇÕES CORRETAS PARA NAVEGADOR (CDN)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // CONFIGURAÇÃO DO FIREBASE (MANTIDA AS SUAS CHAVES)
        const firebaseConfig = {
            apiKey: "AIzaSyCyqzNYyXlAi-Zem5LsYbSB0sv7yKm6nps",
            authDomain: "controle-de-gastos-no-cartao.firebaseapp.com",
            projectId: "controle-de-gastos-no-cartao",
            storageBucket: "controle-de-gastos-no-cartao.firebasestorage.app",
            messagingSenderId: "774835741917",
            appId: "1:774835741917:web:263838cba2af507e746734",
            measurementId: "G-1R894Y6VZE"
        };

        // INICIALIZAÇÃO
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // VARIÁVEIS GLOBAIS
        window.gastos = [];
        window.historicoPagos = [];
        let meuGrafico = null;

        const categoriasLista = ["Supermercado", "Lanche", "Almoço em Restaurante", "Comunicação", "Concurso", "Eletrodoméstico", "Entretenimento", "Financiamento Estudantil", "Gastos Esporádicos", "Gastos Pessoais - Sidiclei", "Gastos Pessoais - Glasy", "Impostos e Taxas", "Moradia", "Roupas/Calçados", "Saúde - Médico/Dentista/Farmácia/Academia", "Seguro", "Sorteios", "Transporte", "Viagem"].sort();
        const mesesNomes = ["Jan", "Fev", "Mar", "Abr", "Mai", "Jun", "Jul", "Ago", "Set", "Out", "Nov", "Dez"];

        // --- SINCRONIZAÇÃO EM TEMPO REAL ---
        
        onSnapshot(collection(db, "gastos"), (snapshot) => {
            window.gastos = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderizarDashboards();
            if(!document.getElementById('sec-compras').classList.contains('hidden')) renderizarCompras();
            if(!document.getElementById('sec-detalhe').classList.contains('hidden')) renderizarDetalhesFatura();
            if(!document.getElementById('sec-categorias').classList.contains('hidden')) renderizarCategorias();
        });

        onSnapshot(collection(db, "pagamentos"), (snapshot) => {
            window.historicoPagos = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderizarHistoricoPagos();
            renderizarDashboards();
        });

        // --- FUNÇÕES DE INTERAÇÃO ---

        window.salvarGasto = async (e) => {
            e.preventDefault();
            const novoGasto = {
                data: document.getElementById('data').value,
                descricao: document.getElementById('descricao').value.toUpperCase(),
                valor: parseFloat(document.getElementById('valor').value),
                categoria: document.getElementById('categoria').value,
                parcelas: parseInt(document.getElementById('parcelas').value),
                pagos: [],
                createdAt: new Date()
            };
            try {
                await addDoc(collection(db, "gastos"), novoGasto);
                document.getElementById('gastoForm').reset();
                switchTab('compras');
            } catch (err) { alert("Erro ao salvar: Verifique as regras do seu Firebase."); }
        };

        window.estornarCompra = async (id) => {
            const g = window.gastos.find(x => x.id === id);
            if(g.pagos && g.pagos.length > 0) return alert("Estorne os pagamentos desta compra primeiro.");
            if(confirm("Remover esta compra permanentemente?")) {
                await deleteDoc(doc(db, "gastos", id));
            }
        };

        window.confirmarBaixaFatura = async () => {
            const hoje = new Date(), compRef = new Date(hoje.getFullYear(), hoje.getMonth(), 1).toLocaleDateString('pt-br', { month: '2-digit', year: 'numeric' });
            const vencimentoFormatado = `01/${new Date(hoje.getFullYear(), hoje.getMonth()+1, 1).toLocaleDateString('pt-br', {month:'2-digit', year:'numeric'})}`;
            let totalBaixado = 0;

            for(let g of window.gastos) {
                const d = new Date(g.data + "T00:00:00"), iniV = new Date(d.getFullYear(), d.getMonth() + 1, 1), fimV = new Date(d.getFullYear(), d.getMonth() + g.parcelas, 1);
                const dataRef = new Date(hoje.getFullYear(), hoje.getMonth() + 1, 1);
                if (dataRef >= iniV && dataRef <= fimV && (!g.pagos || !g.pagos.includes(compRef))) {
                    totalBaixado += (g.valor / g.parcelas);
                    const docRef = doc(db, "gastos", g.id);
                    await updateDoc(docRef, { pagos: [...(g.pagos || []), compRef] });
                }
            }

            await addDoc(collection(db, "pagamentos"), {
                dataPagamentoReal: new Date(document.getElementById('dataPagamentoReal').value + "T00:00:00").toLocaleDateString('pt-br'),
                competencia: compRef,
                valor: totalBaixado,
                vencimentoOriginal: vencimentoFormatado,
                createdAt: new Date()
            });
            fecharModal();
            switchTab('hist');
        };

        // --- LÓGICA DE INTERFACE ---
        
        window.configurarFiltros = () => {
            const fMes = document.querySelectorAll('#filtroMesCat, #fMesCompra, #fMesDet');
            const fAno = document.querySelectorAll('#filtroAnoCat, #fAnoCompra, #fAnoDet');
            const fCatFiltros = document.querySelectorAll('#fCatCompra, #fCatDet');
            const hoje = new Date(), anoC = hoje.getFullYear(), mesC = hoje.getMonth();
            
            fMes.forEach(s => { s.innerHTML = ""; mesesNomes.forEach((m, i) => { let opt = document.createElement('option'); opt.value = i; opt.innerHTML = m; s.appendChild(opt); })});
            fAno.forEach(s => { s.innerHTML = ""; for(let a = anoC - 1; a <= anoC + 2; a++) { let opt = document.createElement('option'); opt.value = a; opt.innerHTML = a; s.appendChild(opt); }});
            fCatFiltros.forEach(s => {
                s.innerHTML = '<option value="TODAS">TODAS AS CATEGORIAS</option>';
                categoriasLista.forEach(c => { let opt = document.createElement('option'); opt.value = c; opt.innerHTML = c; s.appendChild(opt); });
            });
            
            const catSelect = document.getElementById('categoria');
            catSelect.innerHTML = "";
            categoriasLista.forEach(c => { let opt = document.createElement('option'); opt.value = c; opt.innerHTML = c; catSelect.appendChild(opt); });
            
            document.getElementById('filtroMesCat').value = (mesC + 1) % 12;
            document.getElementById('filtroAnoCat').value = (mesC === 11) ? anoC + 1 : anoC;
            document.getElementById('fMesCompra').value = mesC;
            document.getElementById('fAnoCompra').value = anoC;
            document.getElementById('fMesDet').value = (mesC + 1) % 12;
            document.getElementById('fAnoDet').value = (mesC === 11) ? anoC + 1 : anoC;

            const selectP = document.getElementById('parcelas');
            selectP.innerHTML = "";
            for(let i=1; i<=24; i++) { let opt = document.createElement('option'); opt.value = i; opt.innerHTML = i === 1 ? 'À vista' : i + 'x parcelas'; selectP.appendChild(opt); }
        };

        window.formatar = (v) => v.toLocaleString('pt-br', { style: 'currency', currency: 'BRL' });

        window.switchTab = (tab) => {
            document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('nav button').forEach(b => { b.classList.remove('tab-active'); b.classList.add('text-slate-400'); });
            document.getElementById(`sec-${tab}`).classList.remove('hidden');
            document.getElementById(`tab-${tab}`).classList.add('tab-active');
            if(tab === 'compras') renderizarCompras();
            if(tab === 'detalhe') renderizarDetalhesFatura();
            if(tab === 'categorias') renderizarCategorias();
            if(tab === 'mensal') initGrafico();
            if(tab === 'hist') renderizarHistoricoPagos();
        };

        window.renderizarDashboards = () => {
            const hoje = new Date();
            let totalFaturaPendente = 0, saldoAVista = 0, saldoParcelado = 0;
            const compRefAtual = new Date(hoje.getFullYear(), hoje.getMonth(), 1).toLocaleDateString('pt-br', { month: '2-digit', year: 'numeric' });
            const dataVencProx = new Date(hoje.getFullYear(), hoje.getMonth() + 1, 1);
            
            window.gastos.forEach(g => {
                const valorParc = g.valor / g.parcelas, parcelasPagasCount = (g.pagos || []).length, saldoDevedorDesteGasto = g.valor - (valorParc * parcelasPagasCount);
                if (g.parcelas === 1) saldoAVista += saldoDevedorDesteGasto; else saldoParcelado += saldoDevedorDesteGasto;
                const d = new Date(g.data + "T00:00:00"), iniV = new Date(d.getFullYear(), d.getMonth() + 1, 1), fimV = new Date(d.getFullYear(), d.getMonth() + g.parcelas, 1);
                if (dataVencProx >= iniV && dataVencProx <= fimV && (!g.pagos || !g.pagos.includes(compRefAtual))) totalFaturaPendente += valorParc;
            });
            
            document.getElementById('totalFaturaMes').innerText = formatar(totalFaturaPendente);
            document.getElementById('totalAVista').innerText = formatar(saldoAVista);
            document.getElementById('totalParcelado').innerText = formatar(saldoParcelado);
            document.getElementById('totalAberto').innerText = formatar(saldoAVista + saldoParcelado);
            document.getElementById('btnLiquidar').classList.toggle('hidden', totalFaturaPendente === 0);
            document.getElementById('statusPagamentoFatura').innerHTML = (totalFaturaPendente === 0 && window.gastos.length > 0) ? '<span class="bg-emerald-100 text-emerald-700 px-4 py-1 rounded-full text-[10px] font-bold">FATURA PAGA</span>' : '';
        };

        window.renderizarCompras = () => {
            const mes = parseInt(document.getElementById('fMesCompra').value), ano = parseInt(document.getElementById('fAnoCompra').value), cat = document.getElementById('fCatCompra').value;
            let subtotal = 0;
            const filtrados = window.gastos.filter(g => {
                const d = new Date(g.data + "T00:00:00");
                const match = d.getMonth() === mes && d.getFullYear() === ano && (cat === "TODAS" || g.categoria === cat);
                if(match) subtotal += g.valor; return match;
            });
            document.getElementById('totalAbaCompras').innerText = formatar(subtotal);
            const lista = document.getElementById('listaCompras');
            lista.innerHTML = filtrados.length ? '' : '<p class="text-center text-slate-400 py-10 text-xs font-bold uppercase">Nenhum registro</p>';
            [...filtrados].reverse().forEach(g => {
                lista.innerHTML += `<div class="card-white p-5 flex justify-between items-center"><div><p class="text-sm font-bold">${g.descricao}</p><p class="text-[9px] text-slate-400 font-bold uppercase">${g.categoria} • ${g.parcelas}x</p></div><div class="flex items-center gap-4"><p class="font-bold text-sm">${formatar(g.valor)}</p><button onclick="estornarCompra('${g.id}')" class="text-slate-300 hover:text-rose-500"><i class="bi bi-trash3"></i></button></div></div>`;
            });
        };

        window.renderizarDetalhesFatura = () => {
            const mesAlvo = parseInt(document.getElementById('fMesDet').value), anoAlvo = parseInt(document.getElementById('fAnoDet').value), catAlvo = document.getElementById('fCatDet').value;
            const dataVencimentoFiltro = new Date(anoAlvo, mesAlvo, 1);
            let totalPeriodo = 0, html = "";
            window.gastos.forEach(g => {
                const dComp = new Date(g.data + "T00:00:00");
                const numParcela = (dataVencimentoFiltro.getFullYear() - dComp.getFullYear()) * 12 + (dataVencimentoFiltro.getMonth() - dComp.getMonth());
                if (numParcela >= 1 && numParcela <= g.parcelas && (catAlvo === "TODAS" || g.categoria === catAlvo)) {
                    const valorParc = g.valor / g.parcelas; totalPeriodo += valorParc;
                    html += `<div class="card-white p-5 flex justify-between items-center"><div><p class="text-sm font-bold">${g.descricao}</p><p class="text-[9px] text-indigo-600 font-bold uppercase">Parcela ${numParcela}/${g.parcelas} • ${g.categoria}</p></div><p class="font-bold text-sm">${formatar(valorParc)}</p></div>`;
                }
            });
            document.getElementById('totalDetalheFatura').innerText = formatar(totalPeriodo);
            document.getElementById('listaDetalhesFatura').innerHTML = html || '<p class="text-center text-slate-400 py-10 text-xs font-bold uppercase">Vazio</p>';
        };

        window.renderizarCategorias = () => {
            const mes = parseInt(document.getElementById('filtroMesCat').value), ano = parseInt(document.getElementById('filtroAnoCat').value), dataAlvo = new Date(ano, mes, 1), totais = {};
            let somaTotalGeral = 0;
            window.gastos.forEach(g => {
                const d = new Date(g.data + "T00:00:00"), iniV = new Date(d.getFullYear(), d.getMonth() + 1, 1), fimV = new Date(d.getFullYear(), d.getMonth() + g.parcelas, 1);
                if (dataAlvo >= iniV && dataAlvo <= fimV) { const v = (g.valor / g.parcelas); totais[g.categoria] = (totais[g.categoria] || 0) + v; somaTotalGeral += v; }
            });
            document.getElementById('totalGeralCategorias').innerText = formatar(somaTotalGeral);
            const lista = document.getElementById('listaCategorias');
            lista.innerHTML = Object.entries(totais).length ? '' : '<p class="text-center text-slate-400 py-10 text-xs font-bold uppercase">Sem registros</p>';
            Object.entries(totais).sort((a,b)=>b[1]-a[1]).forEach(([cat, val]) => {
                lista.innerHTML += `<div class="card-white p-5 flex justify-between items-center"><span class="text-sm font-bold text-slate-600">${cat}</span><span class="font-bold text-indigo-600 text-sm">${formatar(val)}</span></div>`;
            });
        };

        window.renderizarHistoricoPagos = () => {
            const h = document.getElementById('historicoPagos');
            h.innerHTML = window.historicoPagos.length ? '' : '<p class="text-center text-slate-400 py-10 text-xs font-bold uppercase">Nenhum pagamento</p>';
            [...window.historicoPagos].sort((a,b) => b.createdAt - a.createdAt).forEach(p => {
                h.innerHTML += `<div class="card-white p-5 flex justify-between items-center"><div><p class="text-[10px] font-bold text-indigo-600 uppercase">Pago em: ${p.dataPagamentoReal}</p><p class="text-xs text-slate-400 font-bold">Vencimento: ${p.vencimentoOriginal}</p></div><div class="flex items-center gap-4"><p class="font-bold text-sm">${formatar(p.valor)}</p><button onclick="estornarPagamento('${p.id}')" class="text-rose-400"><i class="bi bi-trash3-fill"></i></button></div></div>`;
            });
        };

        window.estornarPagamento = async (idPagamento) => {
            if(!confirm("Estornar este pagamento?")) return;
            const pg = window.historicoPagos.find(p => p.id === idPagamento);
            for(let g of window.gastos) {
                if(g.pagos && g.pagos.includes(pg.competencia)) {
                    const novoPagos = g.pagos.filter(c => c !== pg.competencia);
                    await updateDoc(doc(db, "gastos", g.id), { pagos: novoPagos });
                }
            }
            await deleteDoc(doc(db, "pagamentos", idPagamento));
        };

        window.initGrafico = () => {
            const ctx = document.getElementById('graficoMensal').getContext('2d');
            const labels = [], valores = []; let hoje = new Date();
            for (let i = 1; i <= 12; i++) {
                let mAlvo = new Date(hoje.getFullYear(), hoje.getMonth() + i, 1);
                labels.push(`${mesesNomes[mAlvo.getMonth()]}/${mAlvo.getFullYear()}`);
                let total = 0;
                window.gastos.forEach(g => {
                    const d = new Date(g.data + "T00:00:00"), ini = new Date(d.getFullYear(), d.getMonth() + 1, 1), fim = new Date(d.getFullYear(), d.getMonth() + g.parcelas, 1);
                    if (mAlvo >= ini && mAlvo <= fim) total += (g.valor / g.parcelas);
                });
                valores.push(total);
            }
            if(meuGrafico) meuGrafico.destroy();
            meuGrafico = new Chart(ctx, { 
                type: 'line', 
                data: { labels, datasets: [{ data: valores, borderColor: '#4f46e5', backgroundColor: 'rgba(79, 70, 229, 0.1)', fill: true, tension: 0.4, borderWidth: 3, pointRadius: 4, pointBackgroundColor: '#4f46e5' }] }, 
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { grid: { color: '#f1f5f9' }, ticks: { font: { size: 10 } } }, x: { grid: { display: false }, ticks: { font: { size: 10 } } } } }
            });
        };

        window.abrirModalBaixa = () => {
            const hoje = new Date(); let total = 0; const dataVenc = new Date(hoje.getFullYear(), hoje.getMonth() + 1, 1);
            const compRef = new Date(hoje.getFullYear(), hoje.getMonth(), 1).toLocaleDateString('pt-br', { month: '2-digit', year: 'numeric' });
            window.gastos.forEach(g => {
                const d = new Date(g.data + "T00:00:00"), iniV = new Date(d.getFullYear(), d.getMonth() + 1, 1), fimV = new Date(d.getFullYear(), d.getMonth() + g.parcelas, 1);
                if (dataVenc >= iniV && dataVenc <= fimV && (!g.pagos || !g.pagos.includes(compRef))) total += (g.valor / g.parcelas);
            });
            document.getElementById('txtCompetenciaIdentificada').innerText = "Referência: " + new Date(hoje.getFullYear(), hoje.getMonth()+1, 1).toLocaleDateString('pt-br', {month:'long', year:'numeric'});
            document.getElementById('valorModalBaixa').innerText = formatar(total); document.getElementById('dataPagamentoReal').valueAsDate = new Date();
            document.getElementById('modalBaixa').classList.remove('hidden');
        };

        window.fecharModal = () => document.getElementById('modalBaixa').classList.add('hidden');
        
        window.addEventListener('load', () => { 
            configurarFiltros(); 
            document.getElementById('dataAtual').innerText = new Date().toLocaleDateString('pt-br', { day: '2-digit', month: 'long', year: 'numeric' }); 
            document.getElementById('gastoForm').addEventListener('submit', window.salvarGasto);
        });

    </script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .tab-active { color: #4f46e5; border-bottom: 3px solid #4f46e5; }
        .card-white { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 1.5rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05); }
        .modal-bg { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); }
        .sticky-header { position: sticky; top: 0; z-index: 50; background: #ffffff; border-bottom: 1px solid #e2e8f0; }
        .animate-in { animation: slideIn 0.3s ease-out; }
        #descricao { text-transform: uppercase; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen pb-10">

    <div id="modalBaixa" class="hidden fixed inset-0 z-[100] modal-bg flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[2rem] p-8 shadow-2xl animate-in">
            <h2 class="text-xl font-bold mb-1">Liquidar Fatura</h2>
            <p id="txtCompetenciaIdentificada" class="text-indigo-600 text-[10px] font-bold uppercase tracking-wider mb-6"></p>
            <div class="space-y-4">
                <label class="block text-xs font-bold text-slate-500 uppercase">Data do Pagamento</label>
                <input type="date" id="dataPagamentoReal" class="w-full bg-slate-50 border border-slate-200 p-4 rounded-xl font-bold">
                <div class="bg-slate-900 p-5 rounded-xl text-white flex justify-between items-center">
                    <div><p class="text-[10px] opacity-70 uppercase font-bold">Valor Total</p><p id="valorModalBaixa" class="text-xl font-bold text-emerald-400">R$ 0,00</p></div>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-3 mt-8">
                <button onclick="fecharModal()" class="py-4 font-bold text-slate-400 hover:text-slate-600">CANCELAR</button>
                <button onclick="confirmarBaixaFatura()" class="bg-indigo-600 text-white py-4 rounded-xl font-bold shadow-lg shadow-indigo-200">CONFIRMAR</button>
            </div>
        </div>
    </div>

    <header class="sticky-header">
        <div class="max-w-6xl mx-auto px-6 py-5 flex justify-between items-center">
            <h1 class="text-sm font-extrabold text-indigo-600 flex items-center gap-2 tracking-tight uppercase">
                <i class="bi bi-credit-card-2-back-fill"></i> CONTROLE DE GASTOS
            </h1>
            <span id="dataAtual" class="text-[9px] font-bold text-slate-400 uppercase tracking-widest"></span>
        </div>
        <nav class="max-w-6xl mx-auto flex overflow-x-auto hide-scroll text-[11px] font-bold uppercase tracking-tight px-4">
            <button onclick="switchTab('dash')" id="tab-dash" class="min-w-max px-5 py-4 tab-active">Saldo Devedor</button>
            <button onclick="switchTab('add')" id="tab-add" class="min-w-max px-5 py-4 text-slate-400">Registrar Gasto</button>
            <button onclick="switchTab('compras')" id="tab-compras" class="min-w-max px-5 py-4 text-slate-400">Histórico de Compras</button>
            <button onclick="switchTab('detalhe')" id="tab-detalhe" class="min-w-max px-5 py-4 text-slate-400">Fatura</button>
            <button onclick="switchTab('categorias')" id="tab-categorias" class="min-w-max px-5 py-4 text-slate-400">Categorias</button>
            <button onclick="switchTab('mensal')" id="tab-mensal" class="min-w-max px-5 py-4 text-slate-400">Gráfico</button>
            <button onclick="switchTab('hist')" id="tab-hist" class="min-w-max px-5 py-4 text-slate-400">Pagamentos</button>
        </nav>
    </header>

    <main class="max-w-4xl mx-auto p-4 pt-6">
        <section id="sec-dash" class="space-y-4 animate-in">
            <div class="card-white p-8 text-center border-t-4 border-t-indigo-600">
                <p class="text-slate-400 text-[10px] font-bold uppercase mb-1">Próxima Fatura (Dia 01)</p>
                <h2 id="totalFaturaMes" class="text-4xl font-extrabold text-slate-900 mb-4">R$ 0,00</h2>
                <div id="statusPagamentoFatura" class="mb-4"></div>
                <button id="btnLiquidar" onclick="abrirModalBaixa()" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold uppercase text-xs tracking-widest">Liquidar Fatura</button>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="card-white p-6"><p class="text-slate-400 text-[9px] font-bold uppercase mb-1">Total à Vista</p><h3 id="totalAVista" class="text-lg font-bold">R$ 0,00</h3></div>
                <div class="card-white p-6"><p class="text-slate-400 text-[9px] font-bold uppercase mb-1">Total Parcelado</p><h3 id="totalParcelado" class="text-lg font-bold">R$ 0,00</h3></div>
            </div>
            <div class="bg-slate-900 p-6 rounded-[1.5rem] text-white flex justify-between items-center shadow-xl">
                <div><p class="text-slate-400 text-[10px] font-bold uppercase mb-1">Saldo Devedor Geral</p><h2 id="totalAberto" class="text-2xl font-bold">R$ 0,00</h2></div>
                <i class="bi bi-activity text-indigo-400 text-2xl"></i>
            </div>
        </section>

        <section id="sec-add" class="hidden animate-in">
            <div class="card-white p-8">
                <h2 class="font-bold text-lg mb-6 uppercase tracking-tight">Registrar Gasto</h2>
                <form id="gastoForm" class="space-y-4">
                    <input type="text" id="descricao" placeholder="DESCRIÇÃO DA COMPRA" required class="w-full bg-slate-50 border border-slate-200 p-4 rounded-xl font-bold">
                    <input type="number" id="valor" step="0.01" placeholder="VALOR TOTAL R$" required class="w-full bg-slate-50 border border-slate-200 p-4 rounded-xl font-extrabold text-xl">
                    <div class="grid grid-cols-2 gap-4"><select id="parcelas" class="bg-slate-50 border border-slate-200 p-4 rounded-xl font-bold text-slate-600"></select><input type="date" id="data" required class="bg-slate-50 border border-slate-200 p-4 rounded-xl text-xs font-bold"></div>
                    <select id="categoria" required class="w-full bg-slate-50 border border-slate-200 p-4 rounded-xl font-bold"></select>
                    <button type="submit" class="w-full bg-indigo-600 text-white p-4 rounded-xl font-bold uppercase text-sm tracking-widest shadow-lg shadow-indigo-100 mt-4">Salvar Registro</button>
                </form>
            </div>
        </section>

        <section id="sec-compras" class="hidden animate-in space-y-4">
            <div class="card-white p-4 flex flex-wrap gap-2">
                <select id="fMesCompra" onchange="renderizarCompras()" class="bg-slate-100 border-none p-2 rounded-lg text-xs font-bold"></select>
                <select id="fAnoCompra" onchange="renderizarCompras()" class="bg-slate-100 border-none p-2 rounded-lg text-xs font-bold"></select>
                <select id="fCatCompra" onchange="renderizarCompras()" class="flex-grow bg-slate-100 border-none p-2 rounded-lg text-xs font-bold"></select>
            </div>
            <div class="bg-indigo-50 border border-indigo-100 p-5 rounded-2xl flex justify-between items-center"><p class="text-[10px] font-bold uppercase text-indigo-600">Total do Período</p><h2 id="totalAbaCompras" class="text-xl font-extrabold text-indigo-900">R$ 0,00</h2></div>
            <div id="listaCompras" class="space-y-3"></div>
        </section>

        <section id="sec-detalhe" class="hidden animate-in space-y-4">
            <div class="card-white p-4 flex flex-wrap gap-2">
                <select id="fMesDet" onchange="renderizarDetalhesFatura()" class="bg-slate-100 border-none p-2 rounded-lg text-xs font-bold"></select>
                <select id="fAnoDet" onchange="renderizarDetalhesFatura()" class="bg-slate-100 border-none p-2 rounded-lg text-xs font-bold"></select>
                <select id="fCatDet" onchange="renderizarDetalhesFatura()" class="flex-grow bg-slate-100 border-none p-2 rounded-lg text-xs font-bold"></select>
            </div>
            <div class="bg-slate-900 p-5 rounded-2xl flex justify-between items-center text-white"><p class="text-[10px] font-bold uppercase opacity-70">Total do Período</p><h2 id="totalDetalheFatura" class="text-xl font-bold">R$ 0,00</h2></div>
            <div id="listaDetalhesFatura" class="space-y-2"></div>
        </section>

        <section id="sec-categorias" class="hidden animate-in space-y-4">
            <div class="card-white p-4 grid grid-cols-2 gap-2"><select id="filtroMesCat" onchange="renderizarCategorias()" class="bg-slate-100 border-none p-2 rounded-lg text-xs font-bold"></select><select id="filtroAnoCat" onchange="renderizarCategorias()" class="bg-slate-100 border-none p-2 rounded-lg text-xs font-bold"></select></div>
            <div class="bg-indigo-600 p-5 rounded-2xl flex justify-between items-center text-white"><p class="text-[10px] font-bold uppercase opacity-80">Total do Período</p><h2 id="totalGeralCategorias" class="text-xl font-bold">R$ 0,00</h2></div>
            <div id="listaCategorias" class="space-y-2"></div>
        </section>

        <section id="sec-mensal" class="hidden animate-in"><div class="card-white p-6 min-h-[450px]"><canvas id="graficoMensal"></canvas></div></section>
        <section id="sec-hist" class="hidden animate-in space-y-3"><div id="historicoPagos" class="space-y-3"></div></section>
    </main>
</body>
</html>
